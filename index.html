<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Sprite Editor</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="p-4">

<div class="container-fluid">

<h2>🎮 Pixel Sprite Editor</h2>

<div class="row mt-3 g-4 align-items-start">
    <div class="col-lg-8">
        <section class="editor-panel">
            <h5 class="panel-title">Sprite Grid (32 × 32)</h5>
            <div id="canvasWrapper">
                <canvas id="mainCanvas" aria-label="32 by 32 pixel drawing grid"></canvas>
            </div>
        </section>
    </div>

    <div class="col-lg-4">
        <section class="editor-panel">
            <h5 class="panel-title">Palette</h5>
            <div id="palette" class="palette-grid" aria-label="Color palette"></div>
        </section>
    </div>
</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
