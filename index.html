<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Sprite Editor</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="p-4">

<div class="container-fluid">

<h2>🎮 Pixel Sprite Editor</h2>

<div class="row mt-3">
    <div class="col-md-8">

        <div id="canvasWrapper">
            <canvas id="onionCanvas"></canvas>
            <canvas id="mainCanvas"></canvas>
        </div>

        <div class="mt-3">
            <button id="prevFrameBtn" class="btn btn-primary">Previous Frame</button>
            <button id="nextFrameBtn" class="btn btn-primary">Next Frame</button>
            <button id="addFrameBtn" class="btn btn-success">Add Frame</button>
            <button id="toggleOnionBtn" class="btn btn-warning">Toggle Onion Skin</button>
        </div>

    </div>

    <div class="col-md-4">

        <h5>Palette</h5>
        <div id="palette" class="d-flex flex-wrap"></div>

        <h5 class="mt-4">Frames</h5>
        <div id="frames" class="d-flex flex-wrap"></div>

    </div>
</div>

</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
