<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Sprite Editor</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #1e1e1e;
    color: white;
}

#canvasWrapper {
    position: relative;
    display: inline-block;
}

canvas {
    image-rendering: pixelated;
    border: 2px solid #444;
    background: #222;
}

.palette-color {
    width: 30px;
    height: 30px;
    cursor: pointer;
    border: 2px solid #444;
}

.palette-color.selected {
    border: 2px solid white;
}

.frame-thumb {
    width: 64px;
    height: 64px;
    border: 2px solid #555;
    margin-right: 5px;
    cursor: pointer;
    image-rendering: pixelated;
}
</style>
</head>
<body class="p-4">

<div class="container-fluid">

<h2>🎮 Pixel Sprite Editor</h2>

<div class="row mt-3">
    <div class="col-md-8">

        <div id="canvasWrapper">
            <canvas id="onionCanvas"></canvas>
            <canvas id="mainCanvas"></canvas>
        </div>

        <div class="mt-3">
            <button class="btn btn-primary" onclick="prevFrame()">Previous Frame</button>
            <button class="btn btn-primary" onclick="nextFrame()">Next Frame</button>
            <button class="btn btn-success" onclick="addFrame()">Add Frame</button>
            <button class="btn btn-warning" onclick="toggleOnion()">Toggle Onion Skin</button>
        </div>

    </div>

    <div class="col-md-4">

        <h5>Palette</h5>
        <div id="palette" class="d-flex flex-wrap"></div>

        <h5 class="mt-4">Frames</h5>
        <div id="frames" class="d-flex flex-wrap"></div>

    </div>
</div>

</div>

<script>
// CONFIG
const gridSize = 16;
const pixelSize = 24;

const palette = [
    "#000000", "#FFFFFF", "#FF0000", "#00FF00",
    "#0000FF", "#FFFF00", "#FF00FF", "#00FFFF"
];

// STATE
let frames = [];
let currentFrame = 0;
let selectedColor = palette[0];
let onionEnabled = true;

// CANVAS SETUP
const mainCanvas = document.getElementById("mainCanvas");
const onionCanvas = document.getElementById("onionCanvas");

mainCanvas.width = onionCanvas.width = gridSize * pixelSize;
mainCanvas.height = onionCanvas.height = gridSize * pixelSize;

onionCanvas.style.position = "absolute";
onionCanvas.style.left = 0;
onionCanvas.style.top = 0;
onionCanvas.style.opacity = 0.3;

const ctx = mainCanvas.getContext("2d");
const onionCtx = onionCanvas.getContext("2d");

// INIT FIRST FRAME
addFrame();

function createEmptyFrame() {
    return Array(gridSize).fill().map(() =>
        Array(gridSize).fill(null)
    );
}

// DRAW GRID
function drawGrid() {
    ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);

    for (let y = 0; y < gridSize; y++) {
        for (let x = 0; x < gridSize; x++) {
            let color = frames[currentFrame][y][x];
            if (color) {
                ctx.fillStyle = color;
                ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
            }
            ctx.strokeStyle = "#333";
            ctx.strokeRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
        }
    }
    drawOnion();
}

function drawOnion() {
    onionCtx.clearRect(0, 0, onionCanvas.width, onionCanvas.height);

    if (!onionEnabled || currentFrame === 0) return;

    let prev = frames[currentFrame - 1];
    for (let y = 0; y < gridSize; y++) {
        for (let x = 0; x < gridSize; x++) {
            let color = prev[y][x];
            if (color) {
                onionCtx.fillStyle = color;
                onionCtx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
            }
        }
    }
}

// CLICK DRAW
mainCanvas.addEventListener("click", function(e) {
    const rect = mainCanvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - rect.left) / pixelSize);
    const y = Math.floor((e.clientY - rect.top) / pixelSize);

    frames[currentFrame][y][x] = selectedColor;
    drawGrid();
    updateThumbnails();
});

// PALETTE
function buildPalette() {
    const paletteDiv = document.getElementById("palette");
    palette.forEach(color => {
        const div = document.createElement("div");
        div.className = "palette-color";
        div.style.background = color;
        div.onclick = () => {
            selectedColor = color;
            document.querySelectorAll(".palette-color")
                .forEach(p => p.classList.remove("selected"));
            div.classList.add("selected");
        };
        paletteDiv.appendChild(div);
    });
}
buildPalette();

// FRAMES
function addFrame() {
    frames.push(createEmptyFrame());
    currentFrame = frames.length - 1;
    drawGrid();
    updateThumbnails();
}

function nextFrame() {
    if (currentFrame < frames.length - 1) {
        currentFrame++;
        drawGrid();
        updateThumbnails();
    }
}

function prevFrame() {
    if (currentFrame > 0) {
        currentFrame--;
        drawGrid();
        updateThumbnails();
    }
}

function toggleOnion() {
    onionEnabled = !onionEnabled;
    drawGrid();
}

// THUMBNAILS
function updateThumbnails() {
    const framesDiv = document.getElementById("frames");
    framesDiv.innerHTML = "";

    frames.forEach((frame, index) => {
        const thumb = document.createElement("canvas");
        thumb.width = gridSize;
        thumb.height = gridSize;
        thumb.className = "frame-thumb";

        const tctx = thumb.getContext("2d");

        for (let y = 0; y < gridSize; y++) {
            for (let x = 0; x < gridSize; x++) {
                if (frame[y][x]) {
                    tctx.fillStyle = frame[y][x];
                    tctx.fillRect(x, y, 1, 1);
                }
            }
        }

        thumb.onclick = () => {
            currentFrame = index;
            drawGrid();
            updateThumbnails();
        };

        if (index === currentFrame)
            thumb.style.border = "2px solid yellow";

        framesDiv.appendChild(thumb);
    });
}

drawGrid();

</script>

</body>
</html>
